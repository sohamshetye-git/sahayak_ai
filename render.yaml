services:
  # Backend API Service
  - type: web
    name: sahayak-ai-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/local.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: AI_PROVIDER
        value: router
      - key: AI_ROUTING_ENABLED
        value: true
      # Add your API keys in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Redis - optional, will run without it
      - key: REDIS_HOST
        value: localhost
      - key: REDIS_PORT
        value: 6379
      # Database - using local JSON files for MVP
      - key: DB_HOST
        value: localhost
      - key: DB_PORT
        value: 5432
